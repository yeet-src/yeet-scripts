# tmux config used only for the bangers session.
# No-prefix bindings — keys go straight to the actions.
#
#   Left      prev banger
#   Right     next banger
#   Space     open readme (in a horizontal split)
#   Escape    quit session (back to picker)
#   Ctrl+C    interrupt the running banger (default behavior)

set -g default-terminal "tmux-256color"
set -g mouse on
set -s escape-time 50
set -g xterm-keys on

bind-key -n Left   run-shell '/opt/scripts/banger/nav.sh prev'
bind-key -n Right  run-shell '/opt/scripts/banger/nav.sh next'
bind-key -n Space  run-shell '/opt/scripts/banger/nav.sh readme'
bind-key -n Escape run-shell '/opt/scripts/banger/nav.sh quit'

# Keep the readme pane locked at its fixed width across terminal resizes.
set-hook -g client-resized       'run-shell -b /opt/scripts/banger/resize_readme.sh'
set-hook -g window-layout-changed 'run-shell -b /opt/scripts/banger/resize_readme.sh'
set-hook -g pane-exited           'run-shell -b /opt/scripts/banger/resize_readme.sh'

# --- vibrant hint bar at the bottom ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour226,fg=colour16'
set -g status-left-length 200
set -g status-right-length 200

# left: current banger label, dark bg, yellow fg → contrast against yellow bar
set -g status-left ' #[bg=colour16,fg=colour226,bold] ♪ #{?@banger-name,#{T:@banger-name},(banger)} #[bg=colour226,fg=colour16] '

# right: keybindings — each key in a contrasting badge so they pop
set -g status-right '#[bg=colour18,fg=colour231,bold] ←/→ #[bg=colour226,fg=colour16,nobold]  prev/next  #[bg=colour22,fg=colour231,bold] Space #[bg=colour226,fg=colour16,nobold]  readme  #[bg=colour88,fg=colour231,bold] Esc #[bg=colour226,fg=colour16,nobold]  quit  #[bg=colour16,fg=colour226,bold] Ctrl+C #[bg=colour226,fg=colour16,nobold]  interrupt '

set -g window-status-format ''
set -g window-status-current-format ''
