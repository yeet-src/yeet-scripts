# Wheel session config — sourced by ai_drive.sh after creating the
# 'let claude cook.' tmux session. Sets session options, no-prefix
# keybindings, and a bottom status bar with hint badges.

set -g default-terminal "tmux-256color"
set -g mouse on
set -s escape-time 50
set -g xterm-keys on

# Pane border: each pane shows its own title at the top. Claude sets
# titles per demo via `tmux select-pane -T <title>` when publishing.
set -g pane-border-status top
set -g pane-border-format ' #[fg=yellow,bold]#{pane_title} #[default]'

# No-prefix bindings:
#   F1     → demos window
#   F2     → spy window
#   F3     → display-panes (flash pane numbers; type a digit to focus)
#   F4     → recompute layout via squarified treemap. Each pane is
#            weighted by its current area, so Claude's intentional
#            sizing (big spectrogram + small uptime) is preserved —
#            the algorithm just makes every rectangle as close to
#            square as possible. Implementation:
#            /opt/scripts/squarify_layout.py. Falls back to tmux's
#            built-in `tiled` if anything goes wrong.
#   F5     → stress check-menu. Multi-select toggle for synthetic
#            cpu / mem / net / disk / procs workloads — driven by
#            stress_runner.sh and reflected in the status bar. The
#            menu pops up via tmux display-popup; Esc cancels.
#            Implementation: /opt/scripts/stress_menu.sh.
#   Space  → toggle zoom on current pane (same as prefix + z)
#   Ctrl+C → kill session (back to main menu)
#
# Note: binding Space at root means the space key cannot be typed into
# any program running inside the wheel session. Fine for this
# observation-focused demo flow; revisit if a pane ever needs interactive
# input from the user.
bind-key -n F1    select-window -t :0
bind-key -n F2    select-window -t :1
bind-key -n F3    display-panes
bind-key -n F4    run-shell -b '/opt/scripts/squarify_layout.py'
bind-key -n F5    display-popup -E -w 70 -h 14 '/opt/scripts/stress_menu.sh'
bind-key -n Space resize-pane -Z
bind-key -n C-c   kill-session

# --- bottom status bar with hint badges ---
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour16,fg=colour245'
set -g status-left-length 200
set -g status-right-length 200
# status-interval is integer-only (min 1s), and refresh-client -S
# reuses the cached #() output rather than re-running it. So we don't
# use #() at all — instead, ai_drive.sh spawns a sidecar (cookstat_spinner.sh)
# that loops sub-second and writes status-left directly via
# `tmux set-option`. status-interval here only affects the static
# status-right badge cell, so 5s is plenty.
set -g status-interval 5

# Left starts blank; the sidecar fills it in once cookstat.txt has content.
set -g status-left ''
set -g status-right '#[bg=colour46,fg=colour16,bold] F1 #[bg=colour16,fg=colour46,nobold]  demos  #[bg=colour51,fg=colour16,bold] F2 #[bg=colour16,fg=colour51,nobold]  spy  #[bg=colour226,fg=colour16,bold] F3 #[bg=colour16,fg=colour226,nobold]  panes  #[bg=colour208,fg=colour16,bold] F4 #[bg=colour16,fg=colour208,nobold]  layout  #[bg=colour196,fg=colour231,bold] F5 #[bg=colour16,fg=colour196,nobold]  stress  #[bg=colour213,fg=colour16,bold] Space #[bg=colour16,fg=colour213,nobold]  zoom  #[bg=colour160,fg=colour231,bold] Ctrl+C #[bg=colour16,fg=colour160,nobold]  menu '

set -g window-status-format ''
set -g window-status-current-format ''
